<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BKU Parking - Login</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="background-setup">/* Custom background setup to handle the watercolor image provided in the prompt */
body {
    background-image: url("./assets/images/BKU%20drawing_1.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center
    }
/* Glassmorphism effect for the card */
.glass-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px)
    }</style>
<style data-purpose="form-customization">
    /* Specific input styling to match the image's light gray background */
    .custom-input {
      background-color: #f3f4f6; /* Tailwind gray-100 */
      border: none;
    }
    .custom-input:focus {
      outline: none;
      box-shadow: 0 0 0 2px #1d4ed8; 
      background-color: #ffffff;
    }
  </style>
</head>
<body class="p-4 sm:p-8" data-page="login">
<!-- BEGIN: LoginContainer -->
<main class="w-full max-w-2xl" data-purpose="login-main-container">
<div class="glass-card rounded-[40px] shadow-2xl p-8 md:p-16 flex flex-col items-center">
<!-- BEGIN: HeaderSection -->
<header class="text-center mb-10">
<h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-3">Welcome Back</h1>
<p class="text-gray-600 text-lg">Please log in to continue</p>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: LoginForm -->
<form class="w-full space-y-6" data-purpose="login-form" id="login-form" method="POST">
<!-- Email Address Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700" for="email">Email Address</label>
<input class="custom-input w-full px-4 py-4 rounded-md text-gray-800 placeholder-gray-400 focus:outline-none transition-all" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2 relative">
<label class="block text-sm font-medium text-gray-700" for="password">Password</label>
<div class="relative">
<input class="custom-input w-full px-4 py-4 rounded-md text-gray-800 placeholder-gray-400 focus:outline-none transition-all pr-12" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
<!-- Password visibility toggle icon (mock) -->
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700" id="toggle-password" type="button">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
</div>
<!-- Remember Me Checkbox -->
<div class="flex items-center">
<input class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded" id="remember" name="remember" type="checkbox"/>
<label class="ml-2 block text-sm text-gray-700" for="remember">
            Remember me
          </label>
</div>
<!-- Log In Submit Button -->
<div class="pt-2">
<button class="w-full bg-[#1d61f2] hover:bg-blue-700 text-white font-semibold py-4 rounded-lg transition-colors text-lg" type="submit">
            Log In
          </button>
<p class="mt-3 text-sm text-red-600" id="login-note"></p>
</div>
</form>
<!-- END: LoginForm -->
<!-- BEGIN: LanguageSelector -->
<footer class="w-full flex justify-end mt-4">
<div class="relative inline-block text-left" data-purpose="language-selector" data-language-layout="login">
<button class="flex items-center text-gray-700 hover:text-gray-900 font-medium text-sm" type="button">
            English (United States)
            <svg class="ml-1 h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" fill-rule="evenodd"></path>
</svg>
</button>
</div>
</footer>
<!-- END: LanguageSelector -->
</div>
</main>
<!-- END: LoginContainer -->
<script defer src="./scripts/i18n.js?v=20260508-02"></script>
<script data-purpose="toggle-password">
    // Minimal logic for the password eye icon toggle
    const navModeKey = "bkuParkingNavMode";
    const storageKey = "bkuParkingProfile";
    const loginActivityKey = "bkuParkingLoginActivity";
    const defaultProfile = {
      firstName: "Thanh",
      lastName: "Nguyen Kong Thenh",
      email: "thanh.nguyenkongthenh@hcmut.edu.vn",
      password: "123456789",
      zone: "Gate 3",
      initials: "TN",
      avatar: "./assets/images/thanh-avatar.svg",
      role: "student"
    };

    const adminProfile = {
      firstName: "Admin",
      lastName: "BKU Parking",
      email: "admin@hcmut.edu.vn",
      password: "admin123",
      zone: "All Gates",
      initials: "AD",
      avatar: "./assets/images/thanh-avatar.svg",
      role: "admin"
    };
    const togglePassword = document.querySelector('#toggle-password');
    const loginForm = document.querySelector('#login-form');
    const passwordInput = document.querySelector('#password');
    const emailInput = document.querySelector('#email');
    const loginNote = document.querySelector('#login-note');
    const savedProfile = (() => {
      try {
        return { ...defaultProfile, ...JSON.parse(localStorage.getItem(storageKey) || "{}") };
      } catch {
        return defaultProfile;
      }
    })();

    if (emailInput) {
      emailInput.value = savedProfile.email || "";
    }

    if (passwordInput) {
      passwordInput.value = savedProfile.password || "";
    }

    if (togglePassword && passwordInput) {
      togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
      });
    }

    if (loginForm) {
      loginForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const email = emailInput?.value.trim().toLowerCase() || "";
        const password = passwordInput?.value || "";

        // Check admin account first
        if (email === adminProfile.email.toLowerCase() && password === adminProfile.password) {
          localStorage.setItem(storageKey, JSON.stringify(adminProfile));
          sessionStorage.setItem(navModeKey, 'authenticated');
          sessionStorage.setItem('bkuParkingRole', 'admin');
          recordTodayLoginActivity();
          if (loginNote) loginNote.textContent = "";
          window.location.href = './admin.html';
          return;
        }

        // Check normal user account
const validEmail = String(defaultProfile.email).trim().toLowerCase();
const validPassword = String(defaultProfile.password);

        if (email !== validEmail || password !== validPassword) {
          if (loginNote) {
            loginNote.textContent = window.bkuI18n?.t("login.incorrectCredentials") || "Incorrect email or password.";
          }
          return;
        }

        const profile = { ...savedProfile, role: "student" };
        localStorage.setItem(storageKey, JSON.stringify(profile));
        sessionStorage.setItem(navModeKey, 'authenticated');
        sessionStorage.setItem('bkuParkingRole', 'student');
        recordTodayLoginActivity();
        if (loginNote) loginNote.textContent = "";
        window.location.href = './index.html';
      });
    }

    function recordTodayLoginActivity() {
      const today = new Date();
      const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
      const savedDays = (() => {
        try {
          const parsed = JSON.parse(localStorage.getItem(loginActivityKey) || "[]");
          return Array.isArray(parsed) ? parsed.filter((day) => typeof day === "string") : [];
        } catch {
          return [];
        }
      })();

      if (savedDays.includes(todayKey)) {
        return;
      }

      savedDays.push(todayKey);
      savedDays.sort();
      localStorage.setItem(loginActivityKey, JSON.stringify(savedDays));
    }
  </script>
</body></html>
